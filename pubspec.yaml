name: vpn_client
description: A modern cross-platform VPN client supporting multiple protocols.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # Network & HTTP
  dio: ^5.4.0
  connectivity_plus: ^6.0.1
  
  # VPN & Core
  process_run: ^1.1.0
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  crypto: ^3.0.3
  
  # Data & Parsing
  json_annotation: ^4.8.1
  
  # System Integration
  system_tray: ^2.0.3
  window_manager: ^0.3.7
  
  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  
  # Charts & Graphics
  fl_chart: ^0.66.2
  
  # Localization
  easy_localization: ^3.0.3
  intl: ^0.20.2
  
  # Utilities
  package_info_plus: ^5.0.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  collection: ^1.18.0
  equatable: ^2.0.5
  uuid: ^3.0.7
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/translations/
    - assets/icons/
    - assets/icons/flags/
    - assets/images/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700